<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="https://kit.fontawesome.com/c1f53912be.js" crossorigin="anonymous"></script>
    <nav class="header">
        <div class="websiteName">
            Tic Tac Toe Game!
        </div>
        <div class="navLinks" onclick="window.location.href='about.html'" >
            <a href="#">About</a>
            <i class="aboutTag fa-solid fa-circle-info" style="color: rgb(163, 166, 168); cursor: pointer;"></i>
        </div>
    </nav>

    <div class="gameContainer">
        <div class="container">
            <div class="box bl-0 bt-0"><span class="boxtext"></span></div>
            <div class="box bt-0"><span class="boxtext"></span></div>
            <div class="box bt-0 br-0"><span class="boxtext"></span></div>
            <div class="box bl-0"><span class="boxtext"></span></div>
            <div class="box"><span class="boxtext"></span></div>
            <div class="box br-0"><span class="boxtext"></span></div>
            <div class="box bl-0 bb-0"><span class="boxtext"></span></div>
            <div class="box bb-0"><span class="boxtext"></span></div>
            <div class="box bb-0 br-0"><span class="boxtext"></span></div>
        </div>

        <div class="gameInfo">
            <h1 class="heading">Welcome to Tic Tac Toe Game.</h1>

            <div class="turnInfo">
                <span class="info">Turn of X</span>
            </div>

            <div class="imgbox">
                <img src="excited.gif" alt="excitedGIF">
            </div>

        </div>

    </div>

    <div class="reset">
        <button id="startGame">Start Game!</button>
        <button id="resetBTN">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
